name: clang-format

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Runs the clang-format hook pinned in .pre-commit-config.yaml, so CI
      # always checks formatting with the exact same clang-format version
      # used by the local pre-commit hook.
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: clang-format --all-files
