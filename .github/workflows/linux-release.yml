name: Linux release artifacts

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build — ${{ matrix.arch.name }}
    runs-on: ${{ matrix.arch.runs-on }}
    strategy:
      matrix:
        arch:
          - { name: x86_64, runs-on: ubuntu-24.04,    bin: dsas-linux-static-x86_64, deb: opendsas-deb-amd64 }
          - { name: arm64,  runs-on: ubuntu-24.04-arm, bin: dsas-linux-static-arm64,  deb: opendsas-deb-arm64  }

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake git build-essential

      - name: Configure (static)
        run: |
          LIBGOMP_A=$(find /usr/lib/gcc -name "libgomp.a" | head -1)
          [ -n "$LIBGOMP_A" ] || { echo "ERROR: libgomp.a not found"; exit 1; }
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++" \
            -DOpenMP_C_LIB_NAMES="gomp" \
            -DOpenMP_CXX_LIB_NAMES="gomp" \
            -DOpenMP_gomp_LIBRARY="$LIBGOMP_A"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Verify static binary
        run: file build/dsas | grep -q "statically linked" || { echo "not static"; exit 1; }

      - name: Package .deb
        run: cd build && cpack -G DEB

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch.bin }}
          path: build/dsas

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch.deb }}
          path: build/*.deb

  # Test on oldest (18.04) and latest (24.04) Ubuntu — a static binary that
  # works on both is guaranteed to work on everything in between.
  verify:
    name: Verify — ${{ matrix.arch.name }} / Ubuntu ${{ matrix.ubuntu }}
    needs: build
    runs-on: ${{ matrix.arch.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - { name: x86_64, runs-on: ubuntu-24.04,    bin: dsas-linux-static-x86_64, deb: opendsas-deb-amd64 }
          - { name: arm64,  runs-on: ubuntu-24.04-arm, bin: dsas-linux-static-arm64,  deb: opendsas-deb-arm64  }
        ubuntu: ["18.04", "24.04"]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.arch.bin }}
          path: dist/bin

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.arch.deb }}
          path: dist/deb

      - name: Test on Ubuntu ${{ matrix.ubuntu }}
        run: |
          chmod +x dist/bin/dsas
          docker run --rm \
            -v "$PWD/dist/bin:/bin_pkg" \
            -v "$PWD/dist/deb:/deb_pkg" \
            ubuntu:${{ matrix.ubuntu }} bash -c '
              /bin_pkg/dsas --version &&
              dpkg -i /deb_pkg/*.deb && command -v dsas
            '

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dsas-linux-static-x86_64
          path: dist/bin/x86_64

      - uses: actions/download-artifact@v4
        with:
          name: dsas-linux-static-arm64
          path: dist/bin/arm64

      - uses: actions/download-artifact@v4
        with:
          name: opendsas-deb-amd64
          path: dist/deb/amd64

      - uses: actions/download-artifact@v4
        with:
          name: opendsas-deb-arm64
          path: dist/deb/arm64

      - name: Rename binaries
        run: |
          mv dist/bin/x86_64/dsas dist/dsas-${{ github.ref_name }}-linux-static-x86_64
          mv dist/bin/arm64/dsas  dist/dsas-${{ github.ref_name }}-linux-static-arm64

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dsas-${{ github.ref_name }}-linux-static-x86_64
            dist/dsas-${{ github.ref_name }}-linux-static-arm64
            dist/deb/amd64/*.deb
            dist/deb/arm64/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
