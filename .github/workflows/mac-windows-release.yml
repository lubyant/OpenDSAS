name: macOS and Windows release

on:
  push:
    tags: [ "v*" ]

jobs:
  build-macos:
    name: Build macOS — ${{ matrix.arch.name }}
    runs-on: ${{ matrix.arch.runner }}
    strategy:
      matrix:
        arch:
          - { name: arm64,  runner: macos-latest, suffix: macos-arm64  }
          - { name: x86_64, runner: macos-13,     suffix: macos-x86_64 }

    steps:
      - uses: actions/checkout@v4

      - name: Install libomp
        run: brew install libomp

      - name: Configure
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF

      - name: Build
        run: cmake --build build --parallel $(sysctl -n hw.logicalcpu)

      - name: Fix libomp rpath
        run: |
          # Replace the absolute Homebrew path with @rpath so the binary is
          # portable — users only need libomp present in their Homebrew prefix.
          LIBOMP=$(otool -L build/dsas | awk '/libomp/{print $1}')
          install_name_tool -change "$LIBOMP" "@rpath/libomp.dylib" build/dsas
          install_name_tool -add_rpath "$(brew --prefix libomp)/lib" build/dsas

      - name: Package
        run: |
          tar -czf dsas-${{ github.ref_name }}-${{ matrix.arch.suffix }}.tar.gz \
            -C build dsas

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch.suffix }}
          path: dsas-${{ github.ref_name }}-${{ matrix.arch.suffix }}.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF

      - name: Build
        run: cmake --build build --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: build/Release/dsas.exe

  release:
    needs: [build-macos, build-windows]
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: macos-x86_64
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: windows-x86_64
          path: dist

      - name: Rename Windows binary
        run: mv dist/dsas.exe dist/dsas-${{ github.ref_name }}-windows-x86_64.exe

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dsas-${{ github.ref_name }}-macos-arm64.tar.gz
            dist/dsas-${{ github.ref_name }}-macos-x86_64.tar.gz
            dist/dsas-${{ github.ref_name }}-windows-x86_64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
