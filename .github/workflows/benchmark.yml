name: Benchmark

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "benchmark/**"
      - "CMakeLists.txt"
      - ".github/workflows/benchmark.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "benchmark/**"
      - "CMakeLists.txt"
      - ".github/workflows/benchmark.yml"
  workflow_dispatch:
    inputs:
      benchmark_filter:
        description: "Regex passed to --benchmark_filter (default: run everything)"
        required: false
        default: ".*"
      repetitions:
        description: "Repetitions per benchmark (--benchmark_repetitions)"
        required: false
        default: "5"

jobs:
  benchmark:
    name: Run dsas_benchmark (Ubuntu + Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libomp-dev

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_BENCHMARK=ON \
            -DBUILD_TESTING=OFF

      - name: Build dsas_benchmark
        run: cmake --build build --target dsas_benchmark -j

      - name: Report runner CPU info
        run: |
          nproc
          lscpu

      - name: Run benchmarks
        working-directory: build
        run: |
          ./dsas_benchmark \
            --benchmark_filter="${{ inputs.benchmark_filter || '.*' }}" \
            --benchmark_repetitions="${{ inputs.repetitions || '5' }}" \
            --benchmark_report_aggregates_only=true \
            --benchmark_out=benchmark_result.json \
            --benchmark_out_format=json \
          | tee benchmark_result.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: |
            build/benchmark_result.json
            build/benchmark_result.txt
          retention-days: 90
