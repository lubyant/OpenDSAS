name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_type: Release
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            build_type: Release
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            build_type: Release
            c_compiler: clang
            cpp_compiler: clang++
          - os: windows-latest
            build_type: Release

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      # ---------- Platform deps ----------
      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libomp-dev

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install libomp

      # ---------- Configure ----------
      # Linux/macOS: pass the compiler explicitly.
      # Windows: omit it — CMake auto-selects the VS 2022 generator with MSVC.
      - name: Configure CMake (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cmake -B ${{ steps.strings.outputs.build-output-dir }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} \
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -S ${{ github.workspace }}

      - name: Configure CMake (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -S "${{ github.workspace }}"

      # ---------- Build / Test ----------
      - name: Build
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

      - name: Test
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config ${{ matrix.build_type }}

  coverage:
    name: Coverage (Ubuntu + Debug)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libomp-dev gcovr

      - name: Configure with coverage flags
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: cmake --build build -j

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure

      - name: Generate Cobertura XML
        run: |
          gcovr -r . --xml-pretty -o coverage.xml \
          --exclude '.*third_party/.*' \
          --exclude '.*tests?/.*' \
          --exclude-unreachable-branches \
          --exclude-throw-branches \
          || true

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
