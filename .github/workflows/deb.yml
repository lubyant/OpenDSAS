name: build-and-test-deb

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu: "20.04"
            codename: focal
          - ubuntu: "22.04"
            codename: jammy
          - ubuntu: "24.04"
            codename: noble
    container:
      image: ubuntu:${{ matrix.ubuntu }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          set -eux
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates git curl pkg-config \
            build-essential cmake \
            libgdal-dev \
            file dpkg-dev
          update-ca-certificates
          git config --system http.sslCAinfo /etc/ssl/certs/ca-certificates.crt
          # sanity checks
          gdal-config --version
          pkg-config --modversion gdal

      - name: Configure
        run: |
          set -eux
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DGDAL_USE_STATIC_LIBS=OFF

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Package (.deb via CPack)
        run: |
          set -eux
          cpack -B build/dist -G DEB --config build/CPackConfig.cmake
          # Append Ubuntu codename so all three artifacts are distinct
          for f in build/dist/*.deb; do
            mv "$f" "${f%.deb}-${{ matrix.codename }}.deb"
          done
          ls -l build/dist

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: opendsas-${{ matrix.codename }}
          path: build/dist/*.deb

  test-install:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu: "20.04"
            codename: focal
          - ubuntu: "22.04"
            codename: jammy
          - ubuntu: "24.04"
            codename: noble

    steps:
      - name: Download .deb
        uses: actions/download-artifact@v4
        with:
          name: opendsas-${{ matrix.codename }}
          path: dist

      - name: Show downloaded files
        run: ls -lah dist

      - name: Test install inside clean Ubuntu ${{ matrix.ubuntu }}
        run: |
          docker run --rm -v "$PWD/dist:/pkg:ro" ubuntu:${{ matrix.ubuntu }} bash -lc '
            set -euo pipefail
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y /pkg/*.deb
            command -v dsas
            dsas --version
            dsas --help >/dev/null
            ldd "$(command -v dsas)"
          '

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    needs: [build, test-install]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: opendsas-focal
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: opendsas-jammy
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: opendsas-noble
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
